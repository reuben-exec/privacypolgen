# Cloudflare Pages configuration
# Docs: https://developers.cloudflare.com/pages/configuration/
name = "privacypolgen"
compatibility_date = "2026-06-14"

pages_build_output_dir = "dist"

# Public environment variables (visible in client-side HTML, no security risk)
[vars]
PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADrnimF1Ud0x-uK7"

# Required secrets (set via `wrangler pages secret put <NAME>`):
#   GOOGLE_TRANSLATE_API_KEY — Google Cloud API key with Cloud Translation API enabled.
#   TURNSTILE_SECRET_KEY     — Cloudflare Turnstile siteverify secret.
#   RESEND_API_KEY           — Resend API key (https://resend.com) for feedback/review emails.
